<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectHub</title>
 
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
 
  <style>
    /* ===========================================================
       VARIABLES CSS
    =========================================================== */
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #22263a;
      --border: #2e3350;
      --text: #e8eaf6;
      --text-muted: #7c84a3;
      --accent: #6c63ff;
      --accent-hover: #5a52e0;
      --green: #10b981;
      --yellow: #f59e0b;
      --blue: #3b82f6;
      --red: #ef4444;
      --radius: 10px;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
 
    /* ===========================================================
       RESET Y BASE
    =========================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
 
    a { color: inherit; text-decoration: none; }
 
    /* ===========================================================
       LAYOUT
    =========================================================== */
    .page-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
 
    .main-content {
      flex: 1;
      padding: 32px 24px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
 
    /* ===========================================================
       NAVBAR
    =========================================================== */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 64px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
 
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo  { font-size: 24px; color: var(--accent); }
 
    .nav-title {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
    }
 
    .nav-links { display: flex; gap: 8px; }
 
    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-muted);
      transition: background 0.2s, color 0.2s;
    }
 
    .nav-link:hover { background: var(--surface-2); color: var(--text); }
 
    .nav-user { display: flex; align-items: center; gap: 12px; }
 
    .nav-role {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .nav-role.manager      { background: #6c63ff22; color: var(--accent); }
    .nav-role.collaborator { background: #10b98122; color: var(--green); }
    .nav-name { font-size: 14px; color: var(--text-muted); }
 
    /* ===========================================================
       BOTONES
    =========================================================== */
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
 
    .btn-primary:hover    { background: var(--accent-hover); }
    .btn-primary:active   { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
 
    .btn-secondary {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
 
    .btn-secondary:hover { background: var(--border); }
 
    .btn-logout {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
 
    .btn-logout:hover { background: #ef444422; }
 
    .btn-full { width: 100%; }
 
    .btn-sm {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
 
    .btn-edit   { background: #3b82f622; color: var(--blue); }
    .btn-delete { background: #ef444422; color: var(--red); }
    .btn-view   { background: #10b98122; color: var(--green); }
 
    .btn-edit:hover, .btn-delete:hover, .btn-view:hover { opacity: 0.8; }
 
    .btn-back {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 20px;
      padding: 0;
      transition: color 0.2s;
    }
 
    .btn-back:hover { color: var(--text); }
 
    /* ===========================================================
       FORMULARIOS
    =========================================================== */
    .form-group { margin-bottom: 18px; }
 
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .form-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
 
    .form-input:focus        { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }
 
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-select   { cursor: pointer; }
    .form-select option { background: var(--surface-2); }
 
    /* ===========================================================
       PAGINA DE LOGIN — YETI ANIMADO
    =========================================================== */
    @keyframes yeti-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-7px); }
    }
 
    @keyframes yeti-shake {
      0%, 100% { transform: translateX(0); }
      20%, 60%  { transform: translateX(-6px); }
      40%, 80%  { transform: translateX(6px); }
    }
 
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 50%, #1a1d3a 0%, var(--bg) 60%);
      padding: 20px;
    }
 
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
 
    .yeti-stage {
      animation: yeti-float 3s ease-in-out infinite;
      margin-bottom: 12px;
    }
 
    .pw-wrapper { position: relative; }
    .pw-wrapper .form-input { padding-right: 42px; }
 
    .pw-toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      color: var(--text-muted);
      transition: color 0.2s;
    }
 
    .pw-toggle-btn:hover { color: var(--text); }
 
    .login-header {
      text-align: center;
      margin-bottom: 28px;
      width: 100%;
    }
 
    .login-title {
      font-family: 'Sora', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }
 
    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 6px;
    }
 
    .login-form { width: 100%; }
 
    .login-error {
      color: var(--red);
      font-size: 13px;
      background: #ef444415;
      border: 1px solid #ef444430;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
 
    .yeti-shake { animation: yeti-shake 0.4s ease; }
 
    .login-hints {
      margin-top: 28px;
      padding: 16px;
      background: var(--surface-2);
      border-radius: 8px;
      font-size: 12px;
      width: 100%;
    }
 
    .hints-title {
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
 
    .hint { color: var(--text-muted); margin-bottom: 4px; }
 
    .hint code {
      background: var(--border);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--accent);
      font-size: 11px;
    }
 
    /* ===========================================================
       DASHBOARD
    =========================================================== */
    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }
 
    .dashboard-title {
      font-family: 'Sora', sans-serif;
      font-size: 24px;
      font-weight: 700;
    }
 
    .dashboard-subtitle { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
 
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
 
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
 
    .stat-icon { font-size: 28px; }
 
    .stat-number {
      display: block;
      font-family: 'Sora', sans-serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
 
    .stat-label { display: block; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
 
    .stat-total   { border-left: 3px solid var(--accent); }
    .stat-active  { border-left: 3px solid var(--blue); }
    .stat-pending { border-left: 3px solid var(--yellow); }
    .stat-done    { border-left: 3px solid var(--green); }
 
    .section-title {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
 
    .projects-list { display: flex; flex-direction: column; gap: 8px; }
 
    .project-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
 
    .project-row:hover { border-color: var(--accent); background: var(--surface-2); }
    .project-row-name  { font-size: 14px; font-weight: 500; }
 
    /* ===========================================================
       PAGINA DE PROYECTOS
    =========================================================== */
    .projects-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }
 
    .page-title { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 700; }
 
    .projects-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
 
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      width: 220px;
      transition: border-color 0.2s;
    }
 
    .search-input:focus        { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
 
    .filter-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      cursor: pointer;
    }
 
    .filter-select option { background: var(--surface-2); }
 
    /* ===========================================================
       TABLA DE PROYECTOS
    =========================================================== */
    .projects-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
 
    .projects-table th {
      text-align: left;
      padding: 14px 16px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
 
    .projects-table td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
 
    .projects-table tr:last-child td { border-bottom: none; }
    .projects-table tbody tr:hover   { background: var(--surface-2); }
 
    .td-desc {
      color: var(--text-muted);
      font-size: 13px;
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
 
    .td-actions { display: flex; gap: 6px; align-items: center; }
 
    .project-link { font-weight: 500; color: var(--text); transition: color 0.2s; }
    .project-link:hover { color: var(--accent); }
 
    /* ===========================================================
       BADGES DE ESTADO
    =========================================================== */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
 
    .status-pending     { background: #f59e0b22; color: var(--yellow); }
    .status-in-progress { background: #3b82f622; color: var(--blue); }
    .status-completed   { background: #10b98122; color: var(--green); }
    .status-lg          { font-size: 14px; padding: 8px 18px; }
 
    /* ===========================================================
       MODAL
    =========================================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
 
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow);
      animation: slideUp 0.25s ease;
    }
 
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }
 
    .modal-title { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 600; }
 
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
    }
 
    .modal-close:hover { color: var(--text); }
 
    .modal-body { padding: 24px; }
 
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
 
    /* ===========================================================
       DETALLE DE PROYECTO
    =========================================================== */
    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
 
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }
 
    .detail-title { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 700; }
    .detail-date  { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
 
    .detail-section { margin-bottom: 24px; }
 
    .detail-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
 
    .detail-text { font-size: 15px; color: var(--text); }
 
    .detail-actions {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      margin-top: 8px;
    }
 
    .status-update-row {
      display: flex;
      gap: 10px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
 
    /* ===========================================================
       LOADER
    =========================================================== */
    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }
 
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
 
    @keyframes spin { to { transform: rotate(360deg); } }
 
    .loader-text { color: var(--text-muted); font-size: 14px; }
 
    /* ===========================================================
       ESTADOS VACIOS Y ERRORES
    =========================================================== */
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 14px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
 
    .error-state { text-align: center; padding: 60px 20px; color: var(--red); }
    .error-icon  { font-size: 40px; margin-bottom: 12px; }
    .error-msg   { font-size: 16px; font-weight: 600; }
    .error-hint  { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
 
    /* ===========================================================
       UTILIDADES
    =========================================================== */
    .hidden { display: none !important; }
 
    /* ===========================================================
       RESPONSIVE
    =========================================================== */
    @media (max-width: 768px) {
      .navbar {
        padding: 12px 16px;
        flex-wrap: wrap;
        height: auto;
        gap: 8px;
      }
 
      .nav-links { display: none; }
 
      .main-content { padding: 20px 16px; }
 
      .projects-header   { flex-direction: column; align-items: flex-start; }
      .projects-controls { width: 100%; }
      .search-input      { width: 100%; }
 
      .projects-table th,
      .projects-table td { padding: 10px; }
      .projects-table    { font-size: 12px; }
      .td-desc           { display: none; }
 
      .dashboard-header { flex-direction: column; }
      .modal-body       { padding: 16px; }
      .stats-grid       { grid-template-columns: repeat(2, 1fr); }
 
      .login-card { padding: 24px 20px 32px; }
    }
  </style>
</head>
<body>
 
  <div id="app"></div>
 
  <script type="module" src="./src/main.js"></script>
 
</body>
</html>
